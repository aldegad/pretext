<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paw Stamp — Pretext Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; -webkit-user-select: none; user-select: none; }
    html, body {
      background: #f5f0e8;
      height: 100%;
      overflow: hidden;
    }
    body { cursor: none; }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 25% 0%, rgba(215,190,155,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 100%, rgba(190,170,140,0.08) 0%, transparent 50%);
    }

    .kuma-logo {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }

    .line {
      position: absolute;
      white-space: pre;
      z-index: 1;
      color: #35302a;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .paw {
      position: absolute;
      pointer-events: none;
      z-index: 100;
      width: 110px;
      height: 110px;
      transform: translate(-50%, -50%) scale(1);
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.18));
      will-change: transform;
      transition: transform 80ms ease-out, filter 80ms ease-out;
    }
    .paw--pressed {
      transform: translate(-50%, -50%) scale(0.75);
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
      transition: transform 60ms ease-in, filter 60ms ease-in;
    }

    .panel-label {
      position: absolute;
      top: 40px;
      font: 500 clamp(11px, 1.1vw, 13px)/1 "Inter", sans-serif;
      color: rgba(0,0,0,0.3);
      text-transform: uppercase;
      letter-spacing: 2.4px;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
      transform: translateX(-50%);
    }

    .divider {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(0,0,0,0.06) 10%,
        rgba(0,0,0,0.06) 90%,
        transparent 100%
      );
      z-index: 200;
      pointer-events: none;
    }

    .fps {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font: 500 clamp(11px, 1vw, 13px)/1.1 "Inter", "SF Mono", monospace;
      color: rgba(0,0,0,0.42);
      letter-spacing: 0.35px;
      z-index: 300;
      pointer-events: none;
      background: rgba(245,240,232,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 9px 16px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.06);
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .paw { width: 80px; height: 80px; }
      .panel-label {
        top: 24px;
        font-size: 14px;
        letter-spacing: 2.8px;
      }
      .fps {
        bottom: 12px;
        font-size: 13px;
        padding: 10px 16px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module" src="./paw-stamp.ts"></script>
</body>
</html>
